name: record_app
description: 减重运动记录 App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.2
  pedometer: ^4.2.0
  http: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  provider: ^6.1.2
  permission_handler: ^12.0.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.0
  fl_chart: ^0.70.2
  intl: ^0.19.0
  
  # UI美化依赖
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  # flutter_icons 替代方案 - 支持 null safety
  flutter_iconpicker: ^3.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # 应用资源
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
